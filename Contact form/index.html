<!DOCTYPE html>
<html>
<head>
    <title>Contact Me Form</title>
</head>

<body>

<h1>Contact me Form</h1>

<form>

<fieldset>
<legend>Personal Information</legend>

<label>First Name</label>
<input type="text" name="firstname">
<br><br>

<label>Last Name</label>
<input type="text" name="lastname">
<br><br>

<label>Email</label>
<input type="email" name="email">
<br><br>

<label>Gender</label>
<input type="radio" name="gender" value="male"> Male
<input type="radio" name="gender" value="female"> Female
<input type="radio" name="gender" value="others"> Others
<br><br>

<label>Company</label>
<input type="text" name="company">
<br><br>

<label>Reason of Contact</label>
<input type="checkbox" name="reason" value="project"> Project
<input type="checkbox" name="reason" value="thesis"> Thesis
<input type="checkbox" name="reason" value="job"> Job
<br><br>

<label>Topics</label>
<input type="checkbox" name="topic" value="web"> Web Development
<input type="checkbox" name="topic" value="software"> Software Development
<input type="checkbox" name="topic" value="ai"> AI/ML Model Development
<br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</fieldset>

</form>

<br>

<a href="index.html">Back to Home</a>

</body>
</html>
